<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Group of Glory - Mission HQ</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle, #0a0a0a, #000);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.screen { display: none; }
.active { display: block; }

.card {
  width: 450px;
  background: #111;
  padding: 25px;
  border-radius: 12px;
  text-align: center;
  box-shadow: 0 0 20px rgba(255,255,255,0.1);
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: none;
  border-radius: 6px;
  outline: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
}

.team-btn {
  width: 32%;
  display: inline-block;
  margin: 5px 1%;
  color: white;
}

.blue { background: #0066ff; }
.red { background: #ff3333; }
.purple { background: #a020f0; }

.submit { background: #00ff88; }
.admin { background: #222; color: white; }

.bar {
  height: 18px;
  margin: 8px 0;
  background: #333;
  border-radius: 5px;
  overflow: hidden;
}

.fill { height: 100%; }
</style>
</head>

<body>

<!-- REGISTER -->
<div class="card screen active" id="register">
  <h2>MISSION HQ</h2>

  <input id="name" placeholder="Name / Nickname">

  <div>
    <button class="team-btn blue" onclick="selectTeam('Blue')">BLUE</button>
    <button class="team-btn red" onclick="selectTeam('Red')">RED</button>
    <button class="team-btn purple" onclick="selectTeam('Purple')">PURPLE</button>
  </div>

  <button class="submit" onclick="submitForm()">REGISTER</button>

  <p id="selectedTeam">No team selected</p>

  <br>
  <button class="admin" onclick="adminLogin()">ADMIN ACCESS</button>
</div>

<!-- LOADING -->
<div class="card screen" id="loading">
  <h2>PROCESSING...</h2>
</div>

<!-- SUCCESS -->
<div class="card screen" id="success">
  <h2>✔ REGISTERED</h2>
</div>

<!-- ADMIN -->
<div class="card screen" id="admin">
  <h2>MISSION HQ DASHBOARD</h2>

  <div id="chart"></div>

  <h3>ROSTER</h3>
  <div id="list" style="text-align:left; max-height:200px; overflow:auto;"></div>

  <br>
  <button onclick="back()">BACK</button>
</div>

<script>

let selectedTeam = "";
let data = JSON.parse(localStorage.getItem("gog_data") || "[]");

function show(id){
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function selectTeam(team){
  selectedTeam = team;
  document.getElementById("selectedTeam").innerText = "Selected Team: " + team;
}

function submitForm(){
  const name = document.getElementById("name").value;

  if(!name || !selectedTeam){
    alert("Enter name + select team");
    return;
  }

  show("loading");

  setTimeout(() => {
    data.push({name, team: selectedTeam});
    localStorage.setItem("gog_data", JSON.stringify(data));

    show("success");

    setTimeout(() => show("register"), 1500);
  }, 1500);
}

function adminLogin(){
  const code = prompt("Enter Admin Code:");

  if(code === "GOG2026"){
    renderAdmin();
    show("admin");
  } else {
    alert("Access Denied");
  }
}

function renderAdmin(){
  const list = document.getElementById("list");
  const chart = document.getElementById("chart");

  list.innerHTML = "";
  chart.innerHTML = "";

  let blue = 0, red = 0, purple = 0;

  data.forEach((d, i) => {
    if(d.team === "Blue") blue++;
    if(d.team === "Red") red++;
    if(d.team === "Purple") purple++;

    list.innerHTML += `
      <div>
        <b>${i+1}. ${d.name}</b><br>
        Team: ${d.team}
        <hr>
      </div>
    `;
  });

  let total = blue + red + purple || 1;

  chart.innerHTML = `
    <h3>TEAM DISTRIBUTION</h3>

    Blue
    <div class="bar"><div class="fill" style="width:${(blue/total)*100}%; background:#0066ff"></div></div>

    Red
    <div class="bar"><div class="fill" style="width:${(red/total)*100}%; background:#ff3333"></div></div>

    Purple
    <div class="bar"><div class="fill" style="width:${(purple/total)*100}%; background:#a020f0"></div></div>
  `;
}

function back(){
  show("register");
}

</script>
